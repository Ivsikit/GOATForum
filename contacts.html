<section class="card">
  <h3>Контактна форма</h3>
  <p class="demo-p">Заповніть форму нижче, щоб залишити повідомлення.</p>

  <form id="contactForm" class="contact-form">
    <label>
      IM'Я
      <input type="text" name="name" placeholder="Baше im'я" required />
    </label>

    <label>
      Email
      <input type="email" name="email" placeholder="Email" required />
    </label>

    <label>
      Пов ідомлення
      <textarea
        name="message"
        rows="6"
        placeholder="Ваше повідомлення"
        required
      ></textarea>
    </label>

    <button type="submit">Надіслати</button>
  </form>
</section>
