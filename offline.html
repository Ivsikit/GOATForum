<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOAT Forum - Немає зв'язку</title>
 <style>
  :root {
    --bg: #0d1117;
    --text: #ffffff;
    --muted: #8b949e;
    --accent: #238636;
    --border: #30363d;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }

  h2 { margin-bottom: 10px; font-weight: 600; }
  p { color: var(--muted); margin-top: 0; font-size: 14px; }

  /* ════════════════════════════════════════════ */
  /* ІГРОВА ЗОНА: ОНОВЛЕНО                           */
  /* ════════════════════════════════════════════ */
  #gameArea {
    width: 100%;
    max-width: 600px;
    height: 200px;
    /* ❌ ВИДАЛИЛИ СТАРУ ЛІНІЮ: border-bottom: 2px solid var(--border); */
    position: relative;
    margin-top: 20px;
    overflow: hidden;
    cursor: pointer;
  }

  /* 🛑 ФІКС 1: Робимо козлика трохи вище, щоб він не сидів "в" траві */
  #goat {
    font-size: 40px;
    position: absolute;
    bottom: 5px; /* ⬅️ Було 0, підняли на 5 пікселів */
    left: 50px;
    z-index: 10;
  }

  .flipped {
    display: inline-block;
    transform: scaleX(-1);
  }

  /* 🛑 ФІКС 2: Вовка теж трохи підняли */
  #obstacle {
    font-size: 40px;
    position: absolute;
    bottom: 5px; /* ⬅️ Було 0 */
    right: -50px;
    z-index: 10;
  }

  /* 🛑 ФІКС 3: ТРАВИЧКА (Магія псевдоелемента) */
  #gameArea::after {
    content: '';
    position: absolute;
    bottom: -1px; /* Притискаємо до самісінького низу */
    left: 0;
    width: 100%;
    height: 15px; /* Висота травички (підлаштуй під свій малюнок) */
    
    /* Підключаємо твій малюнок. Переконайся, що він у тій же папці! */
    background-image: url('grass.png'); 
    
    background-repeat: repeat-x; /* Повторюємо по горизонталі */
    background-size: contain; /* Розтягуємо, щоб заповнити висоту */
    image-rendering: pixelated; /* Щоб травичка була чіткою (для піксель-арту) */
    z-index: 5; /* Вона нижче, ніж козлик і вовк */
  }

  #scoreBoard {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 18px;
    font-weight: bold;
    color: var(--text);
    z-index: 15; /* Рахунок має бути поверх усього */
  }

  #restartBtn {
    display: none;
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    background-color: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: background-color 0.2s;
  }
  #restartBtn:hover { background-color: #2ea043; }

  /* 🛑 ФІКС 4: Оновили анімацію стрибка (тепер від bottom: 5px) */
  .jump {
    animation: jumpAnim 0.5s linear;
  }
  @keyframes jumpAnim {
    0% { bottom: 5px; } /* ⬅️ Стартуємо з 5px */
    40% { bottom: 100px; }
    50% { bottom: 110px; }
    60% { bottom: 100px; }
    100% { bottom: 5px; } /* ⬅️ Повертаємося на 5px */
  }

  .move {
    animation: moveAnim 1.5s infinite linear;
  }
  @keyframes moveAnim {
    0% { right: -50px; }
    100% { right: 100%; }
  }
</style>
</head>
<body>

  <h2>Ой! Інтернет зник 📡</h2>
  <p>Тисни <b>Пробіл</b> або торкайся екрана, щоб козлик стрибав!</p>
  
  <div id="gameArea">
    <div id="scoreBoard">Рахунок: <span id="score">0</span></div>
    <div id="goat"><span class="flipped">🐐</span></div>
    <div id="obstacle">🐺</div>
  </div>

  <button id="restartBtn" onclick="resetGame()">Грати знову 🔄</button>

  <script>
    const goat = document.getElementById('goat');
    const obstacle = document.getElementById('obstacle');
    const scoreSpan = document.getElementById('score');
    const restartBtn = document.getElementById('restartBtn');
    const gameArea = document.getElementById('gameArea');
    
    let isAlive = true;
    let score = 0;
    let scoreInterval;
    let checkCollisionInterval;

    function jump(e) {
      if (e && e.code === 'Space') e.preventDefault();
      if (goat.classList.contains('jump') || !isAlive) return;
      
      goat.classList.add('jump');
      setTimeout(() => goat.classList.remove('jump'), 500);
    }

    function startScore() {
      score = 0;
      scoreSpan.innerText = score;
      scoreInterval = setInterval(() => {
        score++;
        scoreSpan.innerText = score;
      }, 1000);
    }

    function stopScore() {
      clearInterval(scoreInterval);
    }

    // posts (1).js:192
function checkCollision() {
  let goatBottom = parseInt(window.getComputedStyle(goat).getPropertyValue('bottom'));
  let obsRight = parseInt(window.getComputedStyle(obstacle).getPropertyValue('right'));
  let gameWidth = gameArea.offsetWidth;
  
  // 🛑 ЗМІНИЛИ ЦИФРУ: Тепер 45 (бо 5px підняли + 40px висота козлика)
  if (obsRight > (gameWidth - 100) && obsRight < (gameWidth - 50) && goatBottom < 45) {
    gameOver();
  }
}

    function gameOver() {
      isAlive = false;
      stopScore();
      clearInterval(checkCollisionInterval);
      
      obstacle.style.animation = 'none';
      obstacle.style.right = window.getComputedStyle(obstacle).getPropertyValue('right');

      // Емодзі смерті ми не віддзеркалюємо, він і так круглий 😵
      goat.innerHTML = '😵'; 
      restartBtn.style.display = 'block';
    }

    function resetGame() {
      isAlive = true;
      // 🛑 ФІКС 5: Повертаємо віддзеркаленого козлика після рестарту
      goat.innerHTML = '<span class="flipped">🐐</span>'; 
      
      restartBtn.style.display = 'none';
      
      obstacle.style.animation = 'none';
      void obstacle.offsetWidth;
      obstacle.style.right = '-50px';
      obstacle.style.animation = null;
      obstacle.classList.add('move');
      
      startScore();
      checkCollisionInterval = setInterval(checkCollision, 10);
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') jump(e);
    });
    
    gameArea.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
    gameArea.addEventListener('mousedown', (e) => { if(isAlive) jump(); });

    // Старт
    obstacle.classList.add('move');
    startScore();
    checkCollisionInterval = setInterval(checkCollision, 10);

  </script>
</body>
</html>
